name: PR Checks

on:
  push:
    branches-ignore:
      - main
  pull_request:
    branches:
      - main

# Cancel redundant runs when new commits are pushed to the same branch
concurrency:
  group: pr-${{ github.ref }}
  cancel-in-progress: true

# Least-privilege — none of these jobs write to the repo
permissions:
  contents: read

jobs:
  # Catch TypeScript type errors before they reach main
  typecheck:
    name: TypeScript Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
        working-directory: frontend
      - run: npx tsc --noEmit
        working-directory: frontend

  # Catch Python style and logic issues
  lint:
    name: Python Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'
      - run: pip install ruff
      - run: ruff check backend/

  # Validate the Dockerfile builds end-to-end without pushing the image
  docker-build:
    name: Docker Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64
          push: false
          cache-from: type=gha
          cache-to: type=gha,mode=max
