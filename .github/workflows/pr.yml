name: PR Checks

on:
  push:
    branches-ignore:
      - main
  pull_request:
    branches:
      - main

# Cancel redundant runs when new commits are pushed to the same branch
concurrency:
  group: pr-${{ github.ref }}
  cancel-in-progress: true

# Least-privilege — none of these jobs write to the repo
permissions:
  contents: read

jobs:
  # Catch TypeScript type errors and unit-test failures before they reach main
  frontend:
    name: Frontend Typecheck & Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v7
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
        working-directory: frontend
      - run: npx tsc --noEmit
        working-directory: frontend
      - run: npm test
        working-directory: frontend

  # Catch Python style and logic issues
  lint:
    name: Python Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'
      - run: pip install ruff
      - run: ruff check backend/

  # Run the backend unit suite: pure logic (aggregation, validation, sorting,
  # error mapping) plus route behavior with the upstream APIs stubbed.
  backend:
    name: Backend Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'
      - run: pip install -r requirements-dev.txt
        working-directory: backend
      - run: pytest -q
        working-directory: backend

  # Validate the Dockerfile builds end-to-end without pushing the image
  docker-build:
    name: Docker Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: docker/setup-buildx-action@v4
      - uses: docker/build-push-action@v7
        with:
          context: .
          platforms: linux/amd64
          push: false
          cache-from: type=gha
          cache-to: type=gha,mode=max
