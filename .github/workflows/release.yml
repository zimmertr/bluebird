name: Release

on:
  push:
    branches:
      - main
  # Allow manual triggering from the Actions tab for testing without a real merge
  workflow_dispatch:

# Serialize releases so concurrent runs don't race on the manifest update
# (last-write-wins once pinned the deployed tag to the lower version). Keep
# cancel-in-progress false so every merge still releases, just one at a time.
concurrency:
  group: release
  cancel-in-progress: false

# Least-privilege default; jobs that write to the repo override this at the job level
permissions:
  contents: read

jobs:
  # Calculate the next SemVer using GitVersion (conventional commits drive the increment)
  # and bail out early if the Docker Hub image tag already exists (immutability guard)
  determine-version:
    name: Determine Version
    runs-on: ubuntu-latest
    outputs:
      semVer: ${{ steps.gitversion.outputs.semVer }}
      tagExists: ${{ steps.tag-check.outputs.exists }}
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0  # GitVersion needs the full history to calculate the version
      - uses: gittools/actions/gitversion/setup@v4
        with:
          versionSpec: '6.x'
      - id: gitversion
        uses: gittools/actions/gitversion/execute@v4
      - name: Check if image tag already exists on Docker Hub
        id: tag-check
        run: |
          if docker manifest inspect zimmertr/bluebird:${{ steps.gitversion.outputs.semVer }} >/dev/null 2>&1; then
            echo "exists=true" >> $GITHUB_OUTPUT
            echo "Image tag ${{ steps.gitversion.outputs.semVer }} already exists — skipping release"
          else
            echo "exists=false" >> $GITHUB_OUTPUT
          fi

  # Build the Docker image and push it to Docker Hub, then tag the commit in git
  # Skipped if the image tag already exists (prevents overwriting immutable tags)
  build-and-push:
    name: Build & Push
    runs-on: ubuntu-latest
    needs: determine-version
    if: needs.determine-version.outputs.tagExists == 'false'
    permissions:
      contents: write  # Required to push the git tag
    steps:
      - uses: actions/checkout@v7
      - uses: docker/setup-buildx-action@v4
      - uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - uses: docker/build-push-action@v7
        with:
          context: .
          platforms: linux/amd64
          push: true
          tags: zimmertr/bluebird:${{ needs.determine-version.outputs.semVer }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
      - name: Tag Release Commit
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -a "v${{ needs.determine-version.outputs.semVer }}" -m "Release v${{ needs.determine-version.outputs.semVer }}"
          git push origin "v${{ needs.determine-version.outputs.semVer }}"

  # Create a GitHub Release with auto-generated release notes from merged PR titles
  create-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: [determine-version, build-and-push]
    if: needs.determine-version.outputs.tagExists == 'false'
    permissions:
      contents: write
    steps:
      - uses: softprops/action-gh-release@v3
        with:
          tag_name: v${{ needs.determine-version.outputs.semVer }}
          name: v${{ needs.determine-version.outputs.semVer }}
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # Update the image tag in Kubernetes-Manifests so Argo CD rolls out the new version
  # GH_PAT must have contents: write on zimmertr/Kubernetes-Manifests
  update-manifests:
    name: Update Kubernetes Manifests
    runs-on: ubuntu-latest
    needs: [determine-version, create-release]
    if: needs.determine-version.outputs.tagExists == 'false'
    steps:
      - uses: imranismail/setup-kustomize@v3
        with:
          kustomize-version: '5.4.3'

      - name: Update kustomization image tag
        env:
          SEMVER: ${{ needs.determine-version.outputs.semVer }}
          GH_PAT: ${{ secrets.GH_PAT }}
        run: |
          git clone "https://x-access-token:${GH_PAT}@github.com/zimmertr/Kubernetes-Manifests.git" k8s-manifests
          cd k8s-manifests/public/bluebird
          kustomize edit set image zimmertr/bluebird=zimmertr/bluebird:${SEMVER}
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add kustomization.yml
          git diff --cached --quiet || git commit -m "chore: bump bluebird image to ${SEMVER}"
          git push

  # Raise (or update in place) a single PR against bluebird-helm bumping the
  # chart's default image tag (Chart.yaml appVersion) to this release. A chart
  # release only fires on a commit under charts/**, so without this the published
  # chart's default keeps pointing at whatever bluebird release was latest the
  # last time the chart repo happened to change. Merging this PR provides that
  # commit; the chart pipeline's own package-time resolver is the correctness
  # backstop if newer app releases land before it merges.
  #
  # Dependabot-style: a fixed branch is force-pushed each release and only one
  # open PR is ever kept, so rapid releases collapse into a single up-to-date PR
  # rather than a pile. GH_PAT must additionally carry contents + pull-requests
  # write on zimmertr/bluebird-helm (it already has them on Kubernetes-Manifests).
  bump-chart-appversion:
    name: Bump Helm Chart appVersion
    runs-on: ubuntu-latest
    needs: [determine-version, build-and-push, create-release]
    if: needs.determine-version.outputs.tagExists == 'false'
    steps:
      - name: Open or update the appVersion bump PR
        env:
          SEMVER: ${{ needs.determine-version.outputs.semVer }}
          GH_TOKEN: ${{ secrets.GH_PAT }}
          # Provenance for the generated PR body — the app repo, the merge commit
          # that triggered this release, and the base GitHub URL.
          APP_REPO: ${{ github.repository }}
          APP_SHA: ${{ github.sha }}
          SERVER_URL: ${{ github.server_url }}
        run: |
          BR="chore/bump-appversion"
          git clone "https://x-access-token:${GH_TOKEN}@github.com/zimmertr/bluebird-helm.git" helm
          cd helm
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          # Fresh single commit off main every time, so the branch is always the
          # newest appVersion and never a stack of prior bumps.
          git checkout -b "$BR"
          sed -i -E "s|^appVersion:.*|appVersion: \"${SEMVER}\"|" charts/bluebird/Chart.yaml
          if git diff --quiet; then
            echo "Chart appVersion is already ${SEMVER} — nothing to bump."
            exit 0
          fi
          git commit -am "chore(release): bump chart appVersion to ${SEMVER}"
          git push -f origin "$BR"

          # Link the chart bump back to the app release that produced it: the
          # GitHub release, the merge commit, and (best-effort) the PR that merged.
          RELEASE_URL="${SERVER_URL}/${APP_REPO}/releases/tag/v${SEMVER}"
          COMMIT_URL="${SERVER_URL}/${APP_REPO}/commit/${APP_SHA}"
          PR_URL="$(gh api "repos/${APP_REPO}/commits/${APP_SHA}/pulls" -q '.[0].html_url' 2>/dev/null || true)"

          # printf (not a YAML multi-line string) keeps the block's indentation out
          # of the rendered markdown; \` is a literal backtick inside the quotes.
          BODY="$(printf '%s\n\n%s\n- Release: %s\n- Commit: %s' \
            "Automated by the bluebird app release pipeline. Points the chart's default image tag (\`appVersion\`) at the freshly published \`zimmertr/bluebird:${SEMVER}\`. Merging republishes the chart with the new default." \
            "Produced by the app version this points at:" \
            "$RELEASE_URL" "$COMMIT_URL")"
          [ -n "$PR_URL" ] && BODY="$(printf '%s\n- Pull request: %s' "$BODY" "$PR_URL")"

          TITLE="chore(release): bump chart appVersion to ${SEMVER}"
          PR_NUM="$(gh pr list --head "$BR" --state open --json number -q '.[0].number')"
          if [ -n "$PR_NUM" ]; then
            # The force-push already refreshed the branch; refresh the description
            # too so its links track the newest release, not the superseded one.
            gh pr edit "$PR_NUM" --title "$TITLE" --body "$BODY"
            echo "Updated existing PR #${PR_NUM} in place."
          else
            gh pr create --base main --head "$BR" --title "$TITLE" --body "$BODY"
          fi
