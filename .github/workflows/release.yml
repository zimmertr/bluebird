name: Release

on:
  push:
    branches:
      - main

jobs:
  determine-version:
    name: Determine Version
    runs-on: ubuntu-latest
    outputs:
      semVer: ${{ steps.gitversion.outputs.semVer }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: gittools/actions/gitversion/setup@v3
        with:
          versionSpec: '6.x'
      - id: gitversion
        uses: gittools/actions/gitversion/execute@v3

  build-and-push:
    name: Build & Push
    runs-on: ubuntu-latest
    needs: determine-version
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64
          push: true
          tags: |
            zimmertr/bluebird:${{ needs.determine-version.outputs.semVer }}
            zimmertr/bluebird:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
      - name: Tag Release Commit
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -a "v${{ needs.determine-version.outputs.semVer }}" -m "Release v${{ needs.determine-version.outputs.semVer }}"
          git push origin "v${{ needs.determine-version.outputs.semVer }}"

  create-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: [determine-version, build-and-push]
    permissions:
      contents: write
    steps:
      - uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ needs.determine-version.outputs.semVer }}
          name: v${{ needs.determine-version.outputs.semVer }}
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  update-manifests:
    name: Update Kubernetes Manifests
    runs-on: ubuntu-latest
    needs: [determine-version, build-and-push]
    steps:
      - name: Update kustomization image tag
        env:
          SEMVER: ${{ needs.determine-version.outputs.semVer }}
          GH_PAT: ${{ secrets.GH_PAT }}
        run: |
          git clone "https://x-access-token:${GH_PAT}@github.com/zimmertr/Kubernetes-Manifests.git" k8s-manifests
          cd k8s-manifests
          sed -i "s/newTag: .*/newTag: ${SEMVER}/" public/bluebird/kustomization.yml
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/bluebird/kustomization.yml
          git diff --cached --quiet || git commit -m "chore: bump bluebird image to ${SEMVER}"
          git push
