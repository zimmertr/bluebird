name: PR Preview Image

on:
  # pull_request_target (not pull_request): dependabot-triggered pull_request
  # runs get Dependabot's separate (empty) secret store and cannot log in to
  # Docker Hub. _target runs use the base repo's Actions secrets and always
  # take the workflow definition from main, so a PR branch cannot alter this
  # pipeline to leak them.
  pull_request_target:
    types: [opened, synchronize, reopened]

# One build per PR; newer commits supersede in-flight builds.
concurrency:
  group: pr-preview-${{ github.event.pull_request.number }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: write

jobs:
  preview:
    name: Build & push preview image
    runs-on: ubuntu-latest
    # HARD GATE — same-repo PRs only. Under pull_request_target this run holds
    # real secrets even when the PR comes from a fork, so this condition is the
    # only thing keeping strangers from pushing images or spinning up preview
    # environments. Never remove it, and never run PR-authored code outside the
    # Docker build below.
    if: github.event.pull_request.head.repo.full_name == github.repository
    env:
      IMAGE: zimmertr/bluebird-pr
      # Must match the Argo CD generator: pr-{{ .number }}-{{ .head_sha }}
      TAG: pr-${{ github.event.pull_request.number }}-${{ github.event.pull_request.head.sha }}
    steps:
      # Check out the PR head (not the default merge commit) so the image content
      # matches the SHA embedded in the tag.
      - uses: actions/checkout@v7
        with:
          ref: ${{ github.event.pull_request.head.sha }}

      - name: Ensure `create pr container` label (drives the Argo CD pull request generator)
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh label create "create pr container" --repo "$GITHUB_REPOSITORY" \
            --color 1D76DB --description "Deploy a PR preview environment" 2>/dev/null || true
          gh pr edit "${{ github.event.pull_request.number }}" --repo "$GITHUB_REPOSITORY" --add-label "create pr container"

      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - uses: docker/build-push-action@v7
        with:
          context: .
          platforms: linux/amd64
          push: true
          tags: ${{ env.IMAGE }}:${{ env.TAG }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Comment preview URL (sticky — rewrites on each push)
        env:
          GH_TOKEN: ${{ github.token }}
          PR: ${{ github.event.pull_request.number }}
        run: |
          BODY=$(printf '%s\n' \
            "<!-- bluebird-preview -->" \
            "### 🐦 Bluebird preview environment" \
            "" \
            "Once Argo CD syncs, this code will be reachable at" \
            "**http://pr-${PR}.ganymede.sol.milkyway** via \`${IMAGE}:${TAG}\`." \
            "" \
            "<hr>" \
            "" \
            "_Updated for each push; torn down when the PR closes._")
          # Sticky: edit this bot's existing comment (bumping to the current commit's
          # tag) or create it on the first push.
          gh pr comment "$PR" --repo "$GITHUB_REPOSITORY" \
            --edit-last --create-if-none --body "$BODY"
