name: PR Preview Image

on:
  pull_request:
    types: [opened, synchronize, reopened]

# One build per PR; newer commits supersede in-flight builds.
concurrency:
  group: pr-preview-${{ github.event.pull_request.number }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: write

jobs:
  preview:
    name: Build & push preview image
    runs-on: ubuntu-latest
    # Same-repo PRs only. Fork PRs run with a read-only token and no secrets, so
    # they cannot be labeled or built — and the `preview` label (which the Argo CD
    # pull request generator filters on) requires repo write access to apply.
    # Together that keeps strangers from spinning up environments in the cluster.
    if: github.event.pull_request.head.repo.full_name == github.repository
    env:
      IMAGE: zimmertr/bluebird-pr
      # Must match the Argo CD generator: pr-{{ .number }}-{{ .head_sha }}
      TAG: pr-${{ github.event.pull_request.number }}-${{ github.event.pull_request.head.sha }}
    steps:
      # Check out the PR head (not the default merge commit) so the image content
      # matches the SHA embedded in the tag.
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}

      - name: Ensure `preview` label (drives the Argo CD pull request generator)
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh label create preview --repo "$GITHUB_REPOSITORY" \
            --color 1D76DB --description "Deploy a PR preview environment" 2>/dev/null || true
          gh pr edit "${{ github.event.pull_request.number }}" --repo "$GITHUB_REPOSITORY" --add-label preview

      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64
          push: true
          tags: ${{ env.IMAGE }}:${{ env.TAG }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Comment preview URL (once)
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          MARKER="<!-- bluebird-preview -->"
          if ! gh pr view "${{ github.event.pull_request.number }}" --repo "$GITHUB_REPOSITORY" \
               --json comments -q '.comments[].body' | grep -q "$MARKER"; then
            gh pr comment "${{ github.event.pull_request.number }}" --repo "$GITHUB_REPOSITORY" --body "$MARKER
### 🪟 Bluebird preview environment

Once Argo CD syncs, this PR will be reachable **on the LAN** at:

**http://pr-${{ github.event.pull_request.number }}.ganymede.sol.milkyway**

Image: \`${{ env.IMAGE }}:${{ env.TAG }}\` · updates on each push · torn down when the PR closes."
          fi
