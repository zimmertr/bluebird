<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Bluebird Forecast</title>
    <meta
      name="description"
      content="A map-based weather window finder for hikers and mountaineers. Draw an area, pick a forecast window, and get destinations ranked by precipitation, wind, temperature, or air quality."
    />
    <link rel="icon" type="image/png" href="/favicon-32.png" />
    <link rel="apple-touch-icon" href="/icon.png" />

    <!-- Open Graph tags so a pasted link unfurls into a preview card. Slack,
         iMessage, Discord, and X all read these (X falls back to Open Graph, so
         no separate twitter:* tags are needed). Absolute URLs are required. -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="Bluebird Forecast" />
    <meta property="og:title" content="Bluebird Forecast" />
    <meta
      property="og:description"
      content="Draw an area, pick a forecast window, and get destinations ranked by precipitation, wind, temperature, or air quality."
    />
    <meta property="og:url" content="https://bluebirdforecast.com/" />
    <meta property="og:image" content="https://bluebirdforecast.com/icon.png" />
    <meta property="og:image:width" content="1024" />
    <meta property="og:image:height" content="1024" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
