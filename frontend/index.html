<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Bluebird Forecast</title>
    <meta
      name="description"
      content="A map-based weather window finder for hikers and mountaineers. Draw an area, pick a forecast window, and get destinations ranked by precipitation, wind, temperature, or air quality."
    />
    <link rel="icon" type="image/png" href="/icon.png" />
    <link rel="apple-touch-icon" href="/icon.png" />

    <!-- Open Graph / Twitter cards: the whole app is built around shareable
         URLs, so a pasted link should render a real preview instead of bare
         text. Absolute URLs are required by the scrapers. -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="Bluebird Forecast" />
    <meta property="og:title" content="Bluebird Forecast" />
    <meta
      property="og:description"
      content="Draw an area, pick a forecast window, and get destinations ranked by precipitation, wind, temperature, or air quality."
    />
    <meta property="og:url" content="https://bluebirdforecast.com/" />
    <meta property="og:image" content="https://bluebirdforecast.com/icon.png" />
    <meta name="twitter:card" content="summary" />
    <meta name="twitter:title" content="Bluebird Forecast" />
    <meta
      name="twitter:description"
      content="Draw an area, pick a forecast window, and get destinations ranked by precipitation, wind, temperature, or air quality."
    />
    <meta name="twitter:image" content="https://bluebirdforecast.com/icon.png" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
